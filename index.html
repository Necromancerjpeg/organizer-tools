<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Roboto,'Segoe UI',sans-serif;background:#fff;color:#58595B;-webkit-font-smoothing:antialiased}
h1,h2{font-family:'Source Serif 4',serif}
.container{max-width:600px;margin:0 auto;padding:16px;min-height:100vh}
.lbl{display:block;font-size:11px;font-weight:600;color:#58595B;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.5px;font-family:Roboto,sans-serif}
.inp{width:100%;padding:8px 10px;font-size:14px;border:1.5px solid #E2E3E4;border-radius:6px;outline:none;font-family:Roboto,sans-serif;box-sizing:border-box;color:#58595B}
.inp:focus{border-color:#F58220}
.btn{padding:5px 14px;font-size:12px;font-weight:600;border-radius:6px;cursor:pointer;font-family:Roboto,sans-serif;transition:opacity 0.15s}
.btn:hover{opacity:0.85}
.btn-primary{background:#F58220;color:#fff;border:none}
.btn-outline{background:none;border:1.5px solid #E2E3E4;color:#58595B}
.btn-outline.active{border-color:#F58220;background:#F5822010;color:#F58220}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#fff;border-radius:12px;padding:20px;width:100%;max-width:440px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;display:inline-block}
.ring-summary{display:flex;gap:4px;margin-bottom:14px}
.ring-box{flex:1;text-align:center;padding:8px 4px;background:#fff;border-radius:6px;cursor:pointer}
.card{background:#fff;border-radius:8px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer}
.sync-indicator{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:10px}
.sync-ok{background:#2a7d4f15;color:#2a7d4f}
.sync-pending{background:#F5822015;color:#F58220}
.sync-offline{background:#E2E3E4;color:#58595B}
.sync-error{background:#cc333315;color:#cc3333}
.outreach-panel{display:flex;flex-direction:column;gap:8px;padding:10px;background:#f9f9f9;border-radius:8px}
@media(max-width:400px){.container{padding:10px}}
</style>

// ── IndexedDB storage ──
const DB='rm-db',STORE='data';
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB,1);
  r.onupgradeneeded=()=>r.result.createObjectStore(STORE);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);})}
async function dbGet(key){const db=await openDB();return new Promise((res,rej)=>{
  const tx=db.transaction(STORE,'readonly'),r=tx.objectStore(STORE).get(key);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);})}
async function dbSet(key,val){const db=await openDB();return new Promise((res,rej)=>{
  const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(val,key);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);})}

function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

function App(){
  const [contacts,setContacts]=useState([]);
  const [orgFirst,setOrgFirst]=useState("");
  const [orgLast,setOrgLast]=useState("");
  const [syncUrl,setSyncUrl]=useState("");
  const [onboarding,setOnboarding]=useState(true);
  const [showForm,setShowForm]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [activeRing,setActiveRing]=useState(null);
  const [editingId,setEditingId]=useState(null);
  const [formData,setFormData]=useState({...EMPTY});
  const [selected,setSelected]=useState(null);
  const [filterCh,setFilterCh]=useState("All");
  const [filterStatus,setFilterStatus]=useState("All");
  const [view,setView]=useState("map");
  const [loaded,setLoaded]=useState(false);
  const [syncState,setSyncState]=useState("idle"); // idle|syncing|ok|error|offline|pending
  const [lastSync,setLastSync]=useState(null);
  const [onbFirst,setOnbFirst]=useState("");
  const [onbLast,setOnbLast]=useState("");
  const [onbUrl,setOnbUrl]=useState("");
  const syncTimer=useRef(null);
  const pendingSync=useRef(false);

  const migrateContact=(c)=>{
    let out={...c};
    if(out.firstName===undefined){const parts=(out.name||"").trim().split(/\s+/);
      const ln=parts.length>1?parts.pop():"";out.firstName=parts.join(" ");out.lastName=ln;}
    if(out.outreachStatus===undefined){out.outreachStatus="Not Contacted";out.contactMethod="";out.contactDate="";out.contactResult="";out.contactNotes="";}
    return out;
  };

  // Load
  useEffect(()=>{(async()=>{
    try{const d=await dbGet("appdata");
      if(d){setContacts((d.contacts||[]).map(migrateContact));setSyncUrl(d.syncUrl||"");setLastSync(d.lastSync||null);
        if(d.orgFirst){setOrgFirst(d.orgFirst);setOrgLast(d.orgLast||"");setOnboarding(false);}}}
    catch(e){console.log("No saved data")}
    setLoaded(true);
  })();},[]);

  // Save to IndexedDB on every change
  useEffect(()=>{if(!loaded)return;
    dbSet("appdata",{contacts,orgFirst,orgLast,syncUrl,lastSync}).catch(console.error);
  },[contacts,orgFirst,orgLast,syncUrl,lastSync,loaded]);

  // Auto-sync with debounce
  const doSync=useCallback(async()=>{
    if(!syncUrl.trim()||contacts.length===0)return;
    if(!navigator.onLine){setSyncState("offline");pendingSync.current=true;return;}
    setSyncState("syncing");
    try{
      const resp=await fetch(syncUrl.trim(),{method:"POST",headers:{"Content-Type":"text/plain"},
        body:JSON.stringify({action:"sync",organizer:`${orgFirst} ${orgLast}`.trim(),contacts}),
        redirect:"follow"});
      // Apps Script redirects, but the data is received
      setSyncState("ok");setLastSync(new Date().toISOString());pendingSync.current=false;
      setTimeout(()=>setSyncState("idle"),3000);
    }catch(e){
      console.error("Sync failed:",e);
      if(!navigator.onLine){setSyncState("offline");pendingSync.current=true;}
      else{setSyncState("error");pendingSync.current=true;setTimeout(()=>setSyncState("pending"),4000);}
    }
  },[syncUrl,contacts,orgFirst,orgLast]);

  // Debounced auto-sync on contact changes
  useEffect(()=>{if(!loaded||!syncUrl.trim()||onboarding)return;
    if(syncTimer.current)clearTimeout(syncTimer.current);
    setSyncState("pending");
    syncTimer.current=setTimeout(()=>doSync(),3000);
    return()=>{if(syncTimer.current)clearTimeout(syncTimer.current);};
  },[contacts,loaded,syncUrl,onboarding]);

  // Sync when coming back online
  useEffect(()=>{
    const handler=()=>{if(pendingSync.current)doSync();};
    window.addEventListener("online",handler);
    return()=>window.removeEventListener("online",handler);
  },[doSync]);

  const organizer=`${orgFirst} ${orgLast}`.trim();
  const displayName=(c)=>`${c.firstName} ${c.lastName}`.trim();
  const initials=(c)=>{const f=c.firstName?c.firstName[0]:"";const l=c.lastName?c.lastName[0]:"";return(f+l).toUpperCase()||"?";};

  const sortedContacts=(list)=>[...list].sort((a,b)=>{
    if(a.ring!==b.ring)return a.ring-b.ring;
    const cmp=(a.lastName||"").localeCompare(b.lastName||"");
    return cmp!==0?cmp:(a.firstName||"").localeCompare(b.firstName||"");
  });

  const exportCSV=()=>{
    const h=["Organizer First Name","Organizer Last Name","Ring","First Name","Last Name","Organization","Channel","Phone","Email","Known NDP","Outreach Status","Contact Method","Contact Date","Contact Result","Contact Notes","Notes"];
    const rows=sortedContacts(contacts).map(c=>
      [orgFirst,orgLast,RINGS[c.ring].label,c.firstName,c.lastName,c.organization,c.channel,
        c.phone||"",c.email||"",c.knownNDP||"Unknown",c.outreachStatus||"Not Contacted",
        c.contactMethod||"",c.contactDate||"",c.contactResult||"",
        (c.contactNotes||"").replace(/"/g,'""'),(c.notes||"").replace(/"/g,'""')]
    );
    const csv=[h,...rows].map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="relationship-mapping.csv";a.click();URL.revokeObjectURL(url);
  };

  const startMapping=()=>{if(!onbFirst.trim()||!onbLast.trim())return;
    setOrgFirst(onbFirst.trim());setOrgLast(onbLast.trim());setSyncUrl(onbUrl.trim());setOnboarding(false);};
  const openAdd=(ringId)=>{setActiveRing(ringId);setEditingId(null);setFormData({...EMPTY});setShowForm(true);setSelected(null);};
  const openEdit=(c)=>{setActiveRing(c.ring);setEditingId(c.id);
    setFormData({firstName:c.firstName,lastName:c.lastName,organization:c.organization,channel:c.channel,
      phone:c.phone||"",email:c.email||"",knownNDP:c.knownNDP||"Unknown",notes:c.notes||"",
      outreachStatus:c.outreachStatus||"Not Contacted",contactMethod:c.contactMethod||"",
      contactDate:c.contactDate||"",contactResult:c.contactResult||"",contactNotes:c.contactNotes||""});
    setShowForm(true);setSelected(null);};
  const save=()=>{if(!formData.firstName.trim()||!formData.lastName.trim())return;
    const cleaned={...formData};
    if(cleaned.outreachStatus==="Not Contacted"){cleaned.contactMethod="";cleaned.contactDate="";cleaned.contactResult="";cleaned.contactNotes="";}
    if(editingId){setContacts(p=>p.map(c=>c.id===editingId?{...c,...cleaned,ring:activeRing}:c));}
    else{setContacts(p=>[...p,{id:gid(),ring:activeRing,...cleaned,angle:Math.random()*360}]);}
    setShowForm(false);setFormData({...EMPTY});};
  const del=(id)=>{setContacts(p=>p.filter(c=>c.id!==id));setSelected(null);setShowForm(false);};
  const move=(id,nr)=>{setContacts(p=>p.map(c=>c.id===id?{...c,ring:nr}:c));};

  let filtered=filterCh==="All"?contacts:contacts.filter(c=>c.channel===filterCh);
  if(filterStatus!=="All") filtered=filtered.filter(c=>(c.outreachStatus||"Not Contacted")===filterStatus);
  const rc=RINGS.map(r=>filtered.filter(c=>c.ring===r.id).length);
  const contactedCount=contacts.filter(c=>c.outreachStatus==="Contacted").length;

  const statusBadge=(c)=>{
    const s=c.outreachStatus||"Not Contacted";
    if(s==="Contacted"){
      const r=c.contactResult||"";
      const colors={Interested:"#2a7d4f",Committed:"#1a5c36","Follow Up Needed":"#E8860F","Left Message":"#58595B",
        "No Answer":"#58595B","Not Interested":"#cc3333",Declined:"#cc3333","Wrong Number":"#cc3333"};
      return {text:r||"Contacted",bg:`${colors[r]||"#D4690A"}15`,color:colors[r]||"#D4690A"};
    }
    return {text:"Not Contacted",bg:"#E2E3E4",color:"#58595B"};
  };

  const syncLabel={idle:"",syncing:"Syncing…",ok:"Synced",error:"Sync failed",offline:"Offline",pending:"Unsaved"}[syncState];
  const syncClass={idle:"",syncing:"sync-pending",ok:"sync-ok",error:"sync-error",offline:"sync-offline",pending:"sync-pending"}[syncState];

  // ── Onboarding ──
  if(onboarding) return(
    <div className="container" style={{display:"flex",flexDirection:"column",justifyContent:"center"}}>
      <div style={{textAlign:"center",marginBottom:24}}>
        <img src={NDP_LOGO} alt="NDP / NPD" style={{height:40,marginBottom:16}}/>
      </div>
      <h1 style={{fontSize:28,color:"#58595B",textAlign:"center"}}>Relationship Mapping</h1>
      <p style={{fontSize:14,color:"#58595B",margin:"12px 0 24px",lineHeight:1.5,textAlign:"center"}}>
        Map the people you know across your organizing networks. Start from your closest allies and work outward.</p>
      <div style={{background:"#fff",border:"2px solid #F58220",borderRadius:10,padding:20}}>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          <div style={{flex:1}}><label className="lbl">First name</label>
            <input className="inp" value={onbFirst} onChange={e=>setOnbFirst(e.target.value)} placeholder="First" autoFocus/></div>
          <div style={{flex:1}}><label className="lbl">Last name</label>
            <input className="inp" value={onbLast} onChange={e=>setOnbLast(e.target.value)} onKeyDown={e=>e.key==="Enter"&&startMapping()} placeholder="Last"/></div>
        </div>
        <div style={{marginBottom:14}}>
          <label className="lbl">Sync URL <span style={{textTransform:"none",fontWeight:400}}>(optional — add later in Settings)</span></label>
          <input className="inp" value={onbUrl} onChange={e=>setOnbUrl(e.target.value)} placeholder="https://script.google.com/macros/s/…/exec"/>
        </div>
        <button onClick={startMapping} disabled={!onbFirst.trim()||!onbLast.trim()}
          className="btn btn-primary" style={{width:"100%",padding:"10px 0",fontSize:14,opacity:(onbFirst.trim()&&onbLast.trim())?1:0.4}}>
          Start Mapping</button>
      </div>
      <div style={{marginTop:20,padding:16,background:"#f8f8f8",borderRadius:8,borderLeft:"4px solid #F58220"}}>
        <div style={{fontSize:12,fontWeight:700,color:"#58595B",marginBottom:8}}>How it works</div>
        <div style={{fontSize:12,color:"#58595B",lineHeight:1.6}}>
          <strong style={{color:"#D4690A"}}>Inner Circle</strong> — five people you'd call tonight for a meeting tomorrow.{" "}
          <strong style={{color:"#E8860F"}}>Active Network</strong> — people you know personally and could ask.{" "}
          <strong style={{color:"#F5A050"}}>Broader Community</strong> — acquaintances you've met.{" "}
          <strong style={{color:"#D4B896"}}>Prospects</strong> — people identified but not yet approached.</div>
      </div>
    </div>
  );

  // ── Map ──
  const renderMap=()=>{
    const size=520,cx=size/2,cy=size/2,radii=[52,118,184,250];
    return(
    <div style={{display:"flex",justifyContent:"center",padding:"8px 0"}}>
      <svg viewBox={`0 0 ${size} ${size}`} style={{width:"100%",maxWidth:520,height:"auto"}}>
        {[...RINGS].reverse().map((ring,i)=>{const ri=3-i;
          return <circle key={ring.id} cx={cx} cy={cy} r={radii[ri]} fill={ring.bg} stroke={RING_ACCENT[ri]}
            strokeWidth={1.5} strokeDasharray={ri===3?"6 4":"none"} style={{cursor:"pointer"}} onClick={()=>openAdd(ring.id)}/>;
        })}
        <image href={NDP_LOGO} x={cx-35} y={cy-10} width={70} height={13} opacity={0.8} preserveAspectRatio="xMidYMid meet"/>
        <text x={cx} y={cy+12} textAnchor="middle" fill="#58595B" fontSize="7" fontFamily="Roboto,sans-serif">click ring to add</text>
        {RINGS.map((ring,i)=>
          <text key={"l"+ring.id} x={cx} y={cy-radii[i]+14} textAnchor="middle" fill={ring.color}
            fontSize="9" fontWeight="600" fontFamily="Roboto,sans-serif" style={{pointerEvents:"none"}}>
            {ring.label} ({rc[i]})</text>
        )}
        {filtered.map(contact=>{
          const r=radii[contact.ring]*0.65,angle=(contact.angle||0)*(Math.PI/180);
          const x=cx+r*Math.cos(angle),y=cy+r*Math.sin(angle);
          const isSel=selected?.id===contact.id,clr=RING_ACCENT[contact.ring];
          const contacted=(contact.outreachStatus||"Not Contacted")==="Contacted";
          return(
            <g key={contact.id} style={{cursor:"pointer"}} onClick={e=>{e.stopPropagation();setSelected(isSel?null:contact);}}>
              <circle cx={x} cy={y} r={isSel?14:10} fill={isSel?clr:contacted?"#e8f5e9":"white"} stroke={contacted?"#2a7d4f":clr} strokeWidth={2}/>
              <text x={x} y={y+1} textAnchor="middle" dominantBaseline="middle" fill={isSel?"white":clr}
                fontSize="7" fontWeight="700" fontFamily="Roboto,sans-serif" style={{pointerEvents:"none"}}>
                {initials(contact)}</text>
            </g>);
        })}
      </svg>
    </div>);
  };

  // ── Card ──
  const renderCard=(contact)=>{
    const sb=statusBadge(contact);
    return(
    <div key={contact.id} className="card" style={{border:`1.5px solid ${RING_ACCENT[contact.ring]}22`}}
      onClick={()=>setSelected(selected?.id===contact.id?null:contact)}>
      <div style={{flex:1}}>
        <div style={{fontWeight:700,fontSize:14}}>{contact.firstName} {contact.lastName}</div>
        {contact.organization&&<div style={{fontSize:12,opacity:0.7,marginTop:2}}>{contact.organization}</div>}
        <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
          {contact.channel&&<span className="badge" style={{background:`${RING_ACCENT[contact.ring]}15`,color:RING_ACCENT[contact.ring]}}>{contact.channel}</span>}
          {contact.knownNDP==="Yes"&&<span className="badge" style={{background:"#F5822015",color:"#F58220"}}>NDP</span>}
          <span className="badge" style={{background:sb.bg,color:sb.color}}>{sb.text}</span>
        </div>
      </div>
      <div style={{display:"flex",gap:4,marginLeft:8,flexShrink:0}}>
        <button className="btn btn-outline" style={{padding:"3px 8px",fontSize:11}} onClick={e=>{e.stopPropagation();openEdit(contact);}}>Edit</button>
        <select value={contact.ring} onClick={e=>e.stopPropagation()} onChange={e=>move(contact.id,parseInt(e.target.value))}
          className="inp" style={{padding:"3px 4px",fontSize:11,width:"auto"}}>
          {RINGS.map(r=><option key={r.id} value={r.id}>{r.label}</option>)}
        </select>
      </div>
    </div>);
  };

  // ── Main ──
  return(
    <div className="container">
      {/* Header */}
      <div style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <img src={NDP_LOGO} alt="NDP / NPD" style={{height:28}}/>
            <div>
              <h1 style={{fontSize:22,color:"#58595B",lineHeight:1.2}}>Relationship Mapping</h1>
              <p style={{fontSize:12,color:"#58595B",margin:"2px 0 0",opacity:0.6}}>
                <strong style={{color:"#F58220"}}>{organizer}</strong>
                {contactedCount>0&&<span style={{color:"#2a7d4f",marginLeft:8}}>{contactedCount} contacted</span>}
                {syncState!=="idle"&&syncLabel&&<span className={`sync-indicator ${syncClass}`} style={{marginLeft:8}}>{syncLabel}</span>}
              </p>
            </div>
          </div>
          <div style={{display:"flex",gap:6,marginTop:4}}>
            <button className="btn btn-primary" style={{padding:"5px 14px"}} onClick={()=>doSync()}>Sync</button>
            <button className="btn btn-outline" style={{padding:"5px 10px"}} onClick={()=>setShowSettings(!showSettings)}>\u2699</button>
          </div>
        </div>
      </div>

      {/* Settings */}
      {showSettings&&(
        <div style={{background:"#fff",border:"1.5px solid #E2E3E4",borderRadius:10,padding:16,marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>Settings</div>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <div style={{flex:1}}><label className="lbl">First name</label>
              <input className="inp" value={orgFirst} onChange={e=>setOrgFirst(e.target.value)}/></div>
            <div style={{flex:1}}><label className="lbl">Last name</label>
              <input className="inp" value={orgLast} onChange={e=>setOrgLast(e.target.value)}/></div>
          </div>
          <label className="lbl">Google Sheets Sync URL</label>
          <input className="inp" value={syncUrl} onChange={e=>setSyncUrl(e.target.value)}
            placeholder="https://script.google.com/macros/s/…/exec" style={{marginBottom:8}}/>
          <p style={{fontSize:11,color:"#58595B",opacity:0.5,margin:"0 0 8px",lineHeight:1.4}}>
            Data auto-syncs 3 seconds after each change. Press Sync to push immediately.</p>
          {lastSync&&<p style={{fontSize:11,color:"#58595B",opacity:0.4}}>Last sync: {new Date(lastSync).toLocaleString()}</p>}
          <button className="btn btn-outline" style={{marginTop:8}} onClick={()=>setShowSettings(false)}>Done</button>
        </div>
      )}

      {/* Controls */}
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",gap:6}}>
          {["map","list"].map(v=>
            <button key={v} className={`btn btn-outline ${view===v?"active":""}`} onClick={()=>setView(v)}>
              {v==="map"?"Map":"List"}</button>
          )}
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          <select className="inp" style={{width:"auto",padding:"5px 8px",fontSize:12}} value={filterCh} onChange={e=>setFilterCh(e.target.value)}>
            <option value="All">All Channels</option>
            {CHANNELS.map(ch=><option key={ch} value={ch}>{ch}</option>)}
          </select>
          <select className="inp" style={{width:"auto",padding:"5px 8px",fontSize:12}} value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
            <option value="All">All Status</option>
            <option value="Not Contacted">Not Contacted</option>
            <option value="Contacted">Contacted</option>
          </select>
          {contacts.length>0&&
            <button className="btn btn-outline" onClick={exportCSV}>CSV</button>
          }
        </div>
      </div>

      {/* Ring summary */}
      <div className="ring-summary">
        {RINGS.map((ring,i)=>
          <div key={ring.id} className="ring-box" style={{border:`1.5px solid ${RING_ACCENT[i]}30`}} onClick={()=>openAdd(ring.id)}>
            <div style={{fontSize:18,fontWeight:700,color:RING_ACCENT[i]}}>{rc[i]}</div>
            <div style={{fontSize:9,color:"#58595B",fontWeight:600,lineHeight:1.2}}>{ring.label}</div>
          </div>
        )}
      </div>

      {view==="map"&&renderMap()}

      {/* Selected detail */}
      {view==="map"&&selected&&(()=>{
        const sb=statusBadge(selected);
        return(
        <div style={{background:"#fff",border:`2px solid ${RING_ACCENT[selected.ring]}`,borderRadius:10,padding:14,marginTop:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontWeight:700,fontSize:16}}>{displayName(selected)}</div>
              {selected.organization&&<div style={{fontSize:13,opacity:0.7}}>{selected.organization}</div>}
            </div>
            <span className="badge" style={{background:`${RING_ACCENT[selected.ring]}15`,color:RING_ACCENT[selected.ring],fontWeight:700}}>
              {RINGS[selected.ring].label}</span>
          </div>
          {selected.channel&&<div style={{fontSize:12,opacity:0.7,marginTop:6}}>Channel: {selected.channel}</div>}
          {selected.phone&&<div style={{fontSize:12,opacity:0.7,marginTop:2}}>Phone: {selected.phone}</div>}
          {selected.email&&<div style={{fontSize:12,opacity:0.7,marginTop:2}}>Email: {selected.email}</div>}
          <div style={{marginTop:8,padding:8,background:sb.bg,borderRadius:6}}>
            <span style={{fontSize:12,fontWeight:700,color:sb.color}}>{sb.text}</span>
            {selected.contactMethod&&<span style={{fontSize:11,marginLeft:8}}>via {selected.contactMethod}</span>}
            {selected.contactDate&&<span style={{fontSize:11,marginLeft:8,opacity:0.6}}>{selected.contactDate}</span>}
            {selected.contactNotes&&<div style={{fontSize:12,marginTop:4,fontStyle:"italic"}}>{selected.contactNotes}</div>}
          </div>
          {selected.notes&&<div style={{fontSize:12,marginTop:6,fontStyle:"italic",opacity:0.7}}>{selected.notes}</div>}
          <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
            <button className="btn btn-outline active" onClick={()=>openEdit(selected)}>Edit</button>
            <select className="inp" style={{width:"auto",padding:"5px 8px",fontSize:12}} value={selected.ring}
              onChange={e=>{const nr=parseInt(e.target.value);move(selected.id,nr);setSelected({...selected,ring:nr});}}>
              {RINGS.map(r=><option key={r.id} value={r.id}>Move to: {r.label}</option>)}
            </select>
            <button className="btn" style={{border:"1.5px solid #cc3333",color:"#cc3333",background:"#cc333310",marginLeft:"auto"}}
              onClick={()=>del(selected.id)}>Delete</button>
          </div>
        </div>);
      })()}

      {/* List view */}
      {view==="list"&&(
        <div style={{marginTop:8}}>
          {RINGS.map((ring,idx)=>{
            const rcs=sortedContacts(filtered.filter(c=>c.ring===ring.id));
            if(rcs.length===0&&(filterCh!=="All"||filterStatus!=="All"))return null;
            return(
              <div key={ring.id} style={{marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div>
                    <span style={{fontWeight:700,fontSize:14,color:RING_ACCENT[idx]}}>{ring.label}</span>
                    <span style={{fontSize:11,marginLeft:6,opacity:0.5}}>{ring.desc}</span>
                  </div>
                  <button style={{background:RING_ACCENT[idx],color:"#fff",border:"none",borderRadius:"50%",
                    width:22,height:22,fontSize:16,lineHeight:"20px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}
                    onClick={()=>openAdd(ring.id)}>+</button>
                </div>
                {rcs.length===0?
                  <div style={{textAlign:"center",padding:16,opacity:0.4,fontSize:12,border:"1.5px dashed #E2E3E4",borderRadius:8}}>
                    No contacts yet — click + to add</div>
                :rcs.map(renderCard)}
              </div>);
          })}
        </div>
      )}

      {/* Form modal */}
      {showForm&&(
        <div className="modal-overlay" onClick={()=>setShowForm(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h2 style={{fontSize:18,color:RING_ACCENT[activeRing]}}>
                {editingId?"Edit Contact":`Add to ${RINGS[activeRing].label}`}</h2>
              <button onClick={()=>setShowForm(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#58595B"}}>\u00d7</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div style={{display:"flex",gap:8}}>
                <div style={{flex:1}}><label className="lbl">First name *</label>
                  <input className="inp" value={formData.firstName} onChange={e=>setFormData({...formData,firstName:e.target.value})} placeholder="First" autoFocus/></div>
                <div style={{flex:1}}><label className="lbl">Last name *</label>
                  <input className="inp" value={formData.lastName} onChange={e=>setFormData({...formData,lastName:e.target.value})} placeholder="Last"/></div>
              </div>
              <div><label className="lbl">Organization / Affiliation</label>
                <input className="inp" value={formData.organization} onChange={e=>setFormData({...formData,organization:e.target.value})} placeholder="Union local, group, employer\u2026"/></div>
              <div><label className="lbl">Channel</label>
                <select className="inp" value={formData.channel} onChange={e=>setFormData({...formData,channel:e.target.value})}>
                  <option value="">Select\u2026</option>
                  {CHANNELS.map(ch=><option key={ch} value={ch}>{ch}</option>)}
                </select></div>
              <div style={{display:"flex",gap:8}}>
                <div style={{flex:1}}><label className="lbl">Phone</label>
                  <input className="inp" type="tel" value={formData.phone} onChange={e=>setFormData({...formData,phone:e.target.value})}/></div>
                <div style={{flex:1}}><label className="lbl">Email</label>
                  <input className="inp" type="email" value={formData.email} onChange={e=>setFormData({...formData,email:e.target.value})}/></div>
              </div>
              <div><label className="lbl">Known NDP Connection</label>
                <div style={{display:"flex",gap:6}}>
                  {["Yes","No","Unknown"].map(v=>
                    <button key={v} className={`btn btn-outline ${formData.knownNDP===v?"active":""}`} style={{flex:1,padding:"6px 0"}}
                      onClick={()=>setFormData({...formData,knownNDP:v})}>{v}</button>
                  )}</div></div>
              <div style={{borderTop:"1.5px solid #E2E3E4",paddingTop:10,marginTop:4}}>
                <label className="lbl" style={{color:"#F58220",fontSize:12,marginBottom:8}}>Outreach Tracking</label>
                <div style={{display:"flex",gap:6,marginBottom:10}}>
                  {["Not Contacted","Contacted"].map(v=>
                    <button key={v} className="btn" style={{flex:1,padding:"6px 0",
                      border:formData.outreachStatus===v?"1.5px solid #2a7d4f":"1.5px solid #E2E3E4",
                      background:formData.outreachStatus===v?"#2a7d4f10":"#fff",
                      color:formData.outreachStatus===v?"#2a7d4f":"#58595B"}}
                      onClick={()=>setFormData({...formData,outreachStatus:v})}>{v}</button>
                  )}
                </div>
                {formData.outreachStatus==="Contacted"&&(
                  <div className="outreach-panel">
                    <div style={{display:"flex",gap:8}}>
                      <div style={{flex:1}}><label className="lbl">Method</label>
                        <select className="inp" value={formData.contactMethod} onChange={e=>setFormData({...formData,contactMethod:e.target.value})}>
                          <option value="">Select\u2026</option>
                          {METHODS.map(m=><option key={m} value={m}>{m}</option>)}
                        </select></div>
                      <div style={{flex:1}}><label className="lbl">Date</label>
                        <input className="inp" type="date" value={formData.contactDate} onChange={e=>setFormData({...formData,contactDate:e.target.value})}/></div>
                    </div>
                    <div><label className="lbl">Result</label>
                      <select className="inp" value={formData.contactResult} onChange={e=>setFormData({...formData,contactResult:e.target.value})}>
                        <option value="">Select\u2026</option>
                        {RESULTS.map(r=><option key={r} value={r}>{r}</option>)}
                      </select></div>
                    <div><label className="lbl">Contact Notes</label>
                      <textarea className="inp" value={formData.contactNotes} onChange={e=>setFormData({...formData,contactNotes:e.target.value})}
                        placeholder="What was discussed? Any follow-up needed?" rows={2} style={{resize:"vertical"}}/></div>
                  </div>
                )}
              </div>
              {editingId&&<div><label className="lbl">Ring</label>
                <select className="inp" value={activeRing} onChange={e=>setActiveRing(parseInt(e.target.value))}>
                  {RINGS.map(r=><option key={r.id} value={r.id}>{r.label}</option>)}
                </select></div>}
              <div><label className="lbl">Notes</label>
                <textarea className="inp" value={formData.notes} onChange={e=>setFormData({...formData,notes:e.target.value})}
                  placeholder="How do you know them? What issues do they care about?" rows={3} style={{resize:"vertical"}}/></div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:16}}>
              <button className="btn btn-primary" onClick={save} disabled={!formData.firstName.trim()||!formData.lastName.trim()}
                style={{flex:1,padding:"10px 0",fontSize:14,opacity:(formData.firstName.trim()&&formData.lastName.trim())?1:0.4}}>
                {editingId?"Save Changes":"Add Contact"}</button>
              {editingId&&<button className="btn" style={{padding:"10px 16px",fontSize:14,border:"1.5px solid #cc3333",color:"#cc3333",background:"#fff"}}
                onClick={()=>del(editingId)}>Delete</button>}
            </div>
          </div>
        </div>
      )}

      <div style={{textAlign:"center",padding:"16px 0 8px",fontSize:11,opacity:0.4}}>
        {contacts.length} contact{contacts.length!==1?"s":""} mapped by {organizer}
        {contactedCount>0&&` \u00b7 ${contactedCount} contacted`}
      </div>
      {contacts.length>0&&
        <div style={{textAlign:"center",paddingBottom:16}}>
          <button onClick={()=>{if(confirm("Clear all your contacts? Export first.")){setContacts([]);setSelected(null);}}}
            style={{background:"none",border:"none",fontSize:11,color:"#E2E3E4",cursor:"pointer",textDecoration:"underline"}}>
            Reset my data</button>
        </div>
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

// Register service worker
if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js").catch(console.error)}
</script>
</body>
</html>
